            <p><strong>Hora:</strong> [Hora]</p>

        <div class="mariposa m1">🦋</div>
        <div class="mariposa m2">🦋</div>
        <div class="mariposa m3">🦋</div>

        <div class="mariposa m6">🦋</div>
        <div class="mariposa m6">🦋</div>
        <div class="mariposa m8">🦋</div>
        <div class="mariposa m9">🦋</div>
        <div class="mariposa m10">🦋</div>
        <div class="mariposa m11">🦋</div>
        <div class="mariposa m12">🦋</div>

    <script src="script.js"></script>
