<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Mariposa Salmón y Dorado</title>
    <link rel="stylesheet" href="style_sobre.css">
</head>
<body>

    <div class="butterfly-flight-path">
        <div class="envelope-wrapper" id="envelopeContainer">
            <div class="envelope">
                
                <div class="envelope-back"></div>
                
                <div class="letter">
                    <div class="letter-text">
                        <h3 class="gold-text">¡Qué elegancia!</h3>
                        <p>Este sobre ahora tiene líneas suaves, colores premium y un aterrizaje perfecto.</p>
                    </div>
                </div>
                
                <div class="envelope-front">
                    <svg viewBox="0 0 300 200" preserveAspectRatio="none">
                        <path d="M0,0 L0,200 L300,200 L300,0 L165,115 C155,123 145,123 135,115 Z" fill="var(--salmon)"/>
                    </svg>
                </div>
                
                <div class="flap">
                    <svg viewBox="0 0 300 120" preserveAspectRatio="none">
                        <path d="M0,0 L300,0 L165,110 C155,118 145,118 135,110 L0,0 Z" fill="var(--salmon-light)"/>
                    </svg>
                </div>

            </div>
        </div>
    </div>

    <script src="script_sobre.js"></script>
</body>
</html>
